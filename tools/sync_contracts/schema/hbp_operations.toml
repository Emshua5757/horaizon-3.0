# =============================================================================
# HBP v2 — horAIzon Binary Protocol
# Single Source of Truth Schema
# =============================================================================
# This file drives sync_contracts.py — edit HERE, then run:
#   python -m tools.sync_contracts
# to regenerate all language-specific contract files.
# =============================================================================

[protocol]
version     = 2
port        = 7700
description = "horAIzon Binary Protocol v2 — data-only, bidirectional RPC over WebSocket + MessagePack"

# ---------------------------------------------------------------------------
# Output targets — where generated files land for each language
# ---------------------------------------------------------------------------
[output]
dart       = "client_flutter/lib/core/hbp/generated"
rust       = "shua_governor/src/broker/generated"
go         = "shua_resume/pkg/hbp/generated"
typescript = "shua_diary/src/hbp/generated"
python     = "tools/sync_contracts/generated/python"   # shared; copy to each Python module

# ---------------------------------------------------------------------------
# Enums
# ---------------------------------------------------------------------------

[[enums]]
name        = "MessageType"
description = "Outer frame message type code"
[[enums.variants]]
name  = "Request"
value = 1
[[enums.variants]]
name  = "Response"
value = 2
[[enums.variants]]
name  = "Event"
value = 3
[[enums.variants]]
name  = "Ping"
value = 4
[[enums.variants]]
name  = "Pong"
value = 5
[[enums.variants]]
name  = "Error"
value = 6

[[enums]]
name        = "ModuleState"
description = "Lifecycle state of a managed shua module process"
[[enums.variants]]
name = "Running"
[[enums.variants]]
name = "Sleeping"
[[enums.variants]]
name = "Stopped"
[[enums.variants]]
name = "Unknown"

[[enums]]
name        = "IntentClass"
description = "AI router intent classification result"
[[enums.variants]]
name = "FactualPrecision"
[[enums.variants]]
name = "ReflectiveDialogue"
[[enums.variants]]
name = "CodeAst"
[[enums.variants]]
name = "CopilotCommand"

# ---------------------------------------------------------------------------
# Shared Structs / DTOs
# All field types use HBP canonical types:
#   u8, u32, u64, f32, bool, str, str?, StructName, StructName[]
# ---------------------------------------------------------------------------

[[structs]]
name        = "HbpFrame"
description = "Universal HBP v2 message envelope — every message uses this outer shape"
[[structs.fields]]
name        = "v"
type        = "u8"
description = "Protocol version, always 2"
[[structs.fields]]
name        = "t"
type        = "MessageType"
description = "Message type code"
[[structs.fields]]
name        = "id"
type        = "str"
description = "Transaction ID — UUID v4. RESPONSE echoes REQUEST id. EVENT generates its own."
[[structs.fields]]
name        = "mod"
type        = "str"
description = "Module namespace e.g. shua.resume"
[[structs.fields]]
name        = "op"
type        = "str"
description = "Operation name e.g. compile"
[[structs.fields]]
name        = "ts"
type        = "u64"
description = "Unix timestamp in milliseconds (UTC)"
[[structs.fields]]
name        = "p"
type        = "str"
description = "Payload bytes — msgpack-encoded operation body. Empty string for PING/PONG."
[[structs.fields]]
name        = "err"
type        = "str?"
description = "null on success. Error string on failure. Present only on RESPONSE and ERROR frames."

# --- Governor structs ---

[[structs]]
name = "ModuleEntry"
description = "State of a single managed module process"
[[structs.fields]]
name = "name"
type = "str"
description = "Module namespace e.g. shua.resume"
[[structs.fields]]
name = "state"
type = "ModuleState"
[[structs.fields]]
name = "pid"
type = "u32?"
[[structs.fields]]
name = "ram_mb"
type = "f32?"
[[structs.fields]]
name = "uptime_s"
type = "u32?"

[[structs]]
name = "OllamaInfo"
description = "Current Ollama runtime state"
[[structs.fields]]
name = "loaded_model"
type = "str?"
description = "Name of the currently loaded model, or null"
[[structs.fields]]
name = "ram_mb"
type = "f32?"

[[structs]]
name = "GovernorStatusResponse"
description = "Response payload for governor.status"
[[structs.fields]]
name = "modules"
type = "ModuleEntry[]"
[[structs.fields]]
name = "ollama"
type = "OllamaInfo"

[[structs]]
name = "OllamaLoadRequest"
description = "Request payload for governor.ollama.load"
[[structs.fields]]
name = "model"
type = "str"
description = "Ollama model name e.g. qwen2.5:1.5b"

[[structs]]
name = "OllamaLoadResponse"
[[structs.fields]]
name = "loaded_model"
type = "str"
[[structs.fields]]
name = "ram_mb"
type = "f32"
[[structs.fields]]
name = "duration_ms"
type = "u32"

[[structs]]
name = "ModuleWakeRequest"
[[structs.fields]]
name = "module"
type = "str"
description = "Module namespace to wake e.g. shua.resume"

[[structs]]
name = "AiRouteRequest"
[[structs.fields]]
name = "prompt"
type = "str"
[[structs.fields]]
name = "context_hint"
type = "str?"
description = "Optional hint: diary | code | resume | general"

[[structs]]
name = "AiRouteResponse"
[[structs.fields]]
name = "intent"
type = "IntentClass"
[[structs.fields]]
name = "model_used"
type = "str"
[[structs.fields]]
name = "reply"
type = "str"

# --- Resume structs ---

[[structs]]
name = "ResumeCompileRequest"
[[structs.fields]]
name = "matrix_id"
type = "str"
[[structs.fields]]
name = "template"
type = "str"
description = "Typst template name"
[[structs.fields]]
name = "job_desc"
type = "str?"
description = "Optional job description for AI tailoring"
[[structs.fields]]
name = "tailor"
type = "bool"
[[structs.fields]]
name = "ai_enhance"
type = "bool"

[[structs]]
name = "ResumeCompileResponse"
[[structs.fields]]
name = "exhibit_id"
type = "str"
description = "CAS content-addressed ID of the PDF"
[[structs.fields]]
name = "pdf_url"
type = "str"
[[structs.fields]]
name = "duration_ms"
type = "u32"
[[structs.fields]]
name = "tailor_score"
type = "f32?"
description = "Jaccard similarity score if tailored, else null"

# --- Diary structs ---

[[structs]]
name = "DiaryBlockSaveRequest"
[[structs.fields]]
name = "entry_id"
type = "str"
[[structs.fields]]
name = "block_id"
type = "str"
[[structs.fields]]
name = "block_type"
type = "str"
description = "paragraph | heading1 | heading2 | code | quote | callout | moodTracker | aiSummary"
[[structs.fields]]
name = "content"
type = "str"
[[structs.fields]]
name = "sort_order"
type = "str"
description = "LexoRank string"

[[structs]]
name = "DiaryEntryMeta"
description = "Lightweight entry metadata for list views"
[[structs.fields]]
name = "id"
type = "str"
[[structs.fields]]
name = "title"
type = "str"
[[structs.fields]]
name = "mood_score"
type = "f32?"
[[structs.fields]]
name = "created_at"
type = "u64"
description = "Unix ms"
[[structs.fields]]
name = "updated_at"
type = "u64"

[[structs]]
name = "DiaryEntryListResponse"
[[structs.fields]]
name = "entries"
type = "DiaryEntryMeta[]"
[[structs.fields]]
name = "total"
type = "u32"

[[structs]]
name = "SentimentEvent"
description = "Server-pushed sentiment score after a block save"
[[structs.fields]]
name = "entry_id"
type = "str"
[[structs.fields]]
name = "score"
type = "f32"
description = "0.0 = very negative, 1.0 = very positive"
[[structs.fields]]
name = "label"
type = "str"
description = "Positive | Neutral | Negative | Sensitive"

# --- Code Visualizer structs ---

[[structs]]
name = "TopologyExportResponse"
[[structs.fields]]
name = "generated_at"
type = "u64"
description = "Unix ms of last scan"
[[structs.fields]]
name = "file_count"
type = "u32"
[[structs.fields]]
name = "topology_json"
type = "str"
description = "Full topology JSON payload"

[[structs]]
name = "TopologyDeltaEvent"
description = "Pushed when a file changes during watch mode"
[[structs.fields]]
name = "changed_file"
type = "str"
[[structs.fields]]
name = "delta_json"
type = "str"

# ---------------------------------------------------------------------------
# Operations
# Each operation references struct names or "" for empty payloads.
# direction: "request_response" | "event_only"
# ---------------------------------------------------------------------------

# --- shua.governor ---

[[operations]]
module          = "shua.governor"
name            = "ping"
direction       = "request_response"
description     = "Heartbeat check"
request_struct  = ""
response_struct = ""

[[operations]]
module          = "shua.governor"
name            = "status"
direction       = "request_response"
description     = "Returns all module process states and Ollama info"
request_struct  = ""
response_struct = "GovernorStatusResponse"

[[operations]]
module          = "shua.governor"
name            = "module.wake"
direction       = "request_response"
description     = "SIGCONT a suspended module"
request_struct  = "ModuleWakeRequest"
response_struct = ""

[[operations]]
module          = "shua.governor"
name            = "module.sleep"
direction       = "request_response"
description     = "SIGSTOP a running module"
request_struct  = "ModuleWakeRequest"
response_struct = ""

[[operations]]
module          = "shua.governor"
name            = "ollama.load"
direction       = "request_response"
description     = "Load a named Ollama model into RAM"
request_struct  = "OllamaLoadRequest"
response_struct = "OllamaLoadResponse"

[[operations]]
module          = "shua.governor"
name            = "ollama.evict"
direction       = "request_response"
description     = "Evict the currently loaded Ollama model"
request_struct  = ""
response_struct = ""

[[operations]]
module          = "shua.governor"
name            = "ai.route"
direction       = "request_response"
description     = "Route a prompt through the intent classifier and get an AI reply"
request_struct  = "AiRouteRequest"
response_struct = "AiRouteResponse"

# --- shua.resume ---

[[operations]]
module          = "shua.resume"
name            = "compile"
direction       = "request_response"
description     = "Compile a Typst PDF with optional AI tailoring"
request_struct  = "ResumeCompileRequest"
response_struct = "ResumeCompileResponse"

[[operations]]
module          = "shua.resume"
name            = "matrix.get"
direction       = "request_response"
description     = "Fetch the current resume matrix"
request_struct  = ""
response_struct = ""

[[operations]]
module          = "shua.resume"
name            = "history.list"
direction       = "request_response"
description     = "List past PDF compilations"
request_struct  = ""
response_struct = ""

[[operations]]
module          = "shua.resume"
name            = "templates.list"
direction       = "request_response"
description     = "List available Typst templates"
request_struct  = ""
response_struct = ""

# --- shua.diary ---

[[operations]]
module          = "shua.diary"
name            = "entry.list"
direction       = "request_response"
description     = "Paginated diary entry list"
request_struct  = ""
response_struct = "DiaryEntryListResponse"

[[operations]]
module          = "shua.diary"
name            = "entry.create"
direction       = "request_response"
description     = "Create a new diary entry"
request_struct  = ""
response_struct = "DiaryEntryMeta"

[[operations]]
module          = "shua.diary"
name            = "entry.delete"
direction       = "request_response"
description     = "Delete a diary entry and all its blocks"
request_struct  = ""
response_struct = ""

[[operations]]
module          = "shua.diary"
name            = "block.save"
direction       = "request_response"
description     = "Upsert a diary block (debounced)"
request_struct  = "DiaryBlockSaveRequest"
response_struct = ""

[[operations]]
module          = "shua.diary"
name            = "block.delete"
direction       = "request_response"
description     = "Delete a diary block"
request_struct  = ""
response_struct = ""

[[operations]]
module          = "shua.diary"
name            = "sentiment.score"
direction       = "event_only"
description     = "Server-pushed sentiment score after a block save"
event_struct    = "SentimentEvent"

[[operations]]
module          = "shua.diary"
name            = "memory.elevate"
direction       = "request_response"
description     = "Elevate a diary entry to the Global Identity Matrix"
request_struct  = ""
response_struct = ""

# --- shua.code_visualizer ---

[[operations]]
module          = "shua.code_visualizer"
name            = "scan"
direction       = "request_response"
description     = "Trigger a full repo AST scan"
request_struct  = ""
response_struct = "TopologyExportResponse"

[[operations]]
module          = "shua.code_visualizer"
name            = "topology.get"
direction       = "request_response"
description     = "Return the latest topology export without re-scanning"
request_struct  = ""
response_struct = "TopologyExportResponse"

[[operations]]
module          = "shua.code_visualizer"
name            = "watch.start"
direction       = "request_response"
description     = "Start the file-watcher daemon"
request_struct  = ""
response_struct = ""

[[operations]]
module          = "shua.code_visualizer"
name            = "watch.stop"
direction       = "request_response"
description     = "Stop the file-watcher daemon"
request_struct  = ""
response_struct = ""

[[operations]]
module          = "shua.code_visualizer"
name            = "changed"
direction       = "event_only"
description     = "Server-pushed incremental topology delta on file change"
event_struct    = "TopologyDeltaEvent"
